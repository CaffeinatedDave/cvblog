{{ define "main" }}
<article class="article">
  <header>
    <p class="date">{{ .Date.Format "2 Jan 2006" }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.summary }}<p class="lede">{{ . }}</p>{{ end }}
  </header>
  {{ with .Params.image }}
    <figure class="article-image">
      <img src="{{ . | relURL }}" alt="{{ $.Params.imageAlt | default $.Title }}">
    </figure>
  {{ end }}
  <div class="article-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
