<!doctype html>
<html lang="{{ site.Language.Lang }}" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.Params.description }}">
    <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ site.Title }}</title>
    <script>
      const storedTheme = localStorage.getItem('theme');
      document.documentElement.dataset.theme = storedTheme || 'light';
    </script>
    <link rel="stylesheet" href="{{ "css/site.css" | relURL }}?v={{ site.Params.assetVersion }}">
    {{ partial "goat.html" . }}
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ "/" | relURL }}">{{ site.Title }}</a>
      <div class="header-actions">
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="main-navigation" aria-label="Open navigation">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <nav id="main-navigation" aria-label="Main navigation">
        <a href="{{ "/" | relURL }}">CV</a>
        <a href="{{ "/blog/" | relURL }}">Blog</a>
        <a href="{{ "/bookshelf/" | relURL }}">Bookshelf</a>
        <button class="theme-toggle" type="button" aria-pressed="false" aria-label="Use dark mode">
          <span class="theme-toggle-sun" aria-hidden="true"></span>
          <span class="theme-toggle-moon" aria-hidden="true"></span>
        </button>
      </nav>
    </header>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      <p>{{ site.Params.location }} · <a href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a></p>
    </footer>
    <script src="{{ "js/navigation.js" | relURL }}?v={{ site.Params.assetVersion }}"></script>
  </body>
</html>
